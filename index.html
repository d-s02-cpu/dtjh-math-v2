<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗栗大同國中資源中心</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #4caf50; 
            --success-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f5f7fa;
            --step-bg: #fffbe6;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%; max-width: 550px; text-align: center;
        }
        .question-text { font-size: 1.1rem; color: #555; margin-bottom: 0.5rem; text-align: left; }
        #question-box {
            font-size: 1.8rem; margin: 0.5rem 0 1.5rem 0; padding: 1rem;
            background: #f8f9fa; border-radius: 12px; border: 1px solid #eee;
        }
        .step-container {
            margin-top: 1rem; padding: 1rem; border-radius: 15px;
            background: var(--step-bg); border: 1px dashed #ffe58f;
            display: none; 
        }
        .step-title { font-weight: bold; margin-bottom: 10px; color: #856404; display: block; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            padding: 1rem; font-size: 1.1rem; border: 2px solid var(--primary-color);
            background: white; border-radius: 10px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .correct { background: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .wrong { background: var(--error-color) !important; color: white; border-color: var(--error-color); }
        #next-btn {
            margin-top: 1.5rem; padding: 1rem; background: var(--primary-color);
            color: white; border: none; border-radius: 50px; font-size: 1.1rem;
            display: none; width: 100%; cursor: pointer;
        }
        .feedback-text { color: var(--error-color); font-weight: bold; margin-bottom: 10px; min-height: 1.2rem; }
        #quiz-status { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #666; font-weight: bold; align-items: center; }
        .mode-badge { font-size: 0.85rem; padding: 4px 12px; border-radius: 20px; background: #eee; color: #555; }
        
        #start-screen, #quiz-container, #result-screen { display: none; }
        #start-screen { display: block; } 
        
        .score-display { font-size: 3rem; color: var(--primary-color); margin: 1rem 0; }
        .desc-text { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }

        #qrcode-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #qrcode {
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <h2>苗栗大同國中資源中心</h2>
    <h3 id="quiz-title">數學互動練習系統</h3>
    <div class="desc-text" id="quiz-desc">
        請選擇練習主題：
    </div>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <button class="btn" onclick="startQuiz('integer-addition-index.html')">主題一：整數的加減</button>
        <button class="btn" onclick="startQuiz('integer-multiplication-index.html')">主題二：整數的乘除</button>
        <button class="btn" onclick="startQuiz('arithmetic-index.html')">主題四：因數與倍數</button>
    </div>
    
    <div id="qrcode-container">
        <div id="qrcode"></div>
        <span style="font-size: 0.8rem; color: #888;">掃描 QR Code 分享首頁</span>
    </div>
</div>

<div class="container" id="quiz-container">
    <div id="quiz-status">
        <span id="question-number">第 1 題 / 共 10 題</span>
        <span id="mode-badge" class="mode-badge">練習模式</span>
    </div>

    <div class="question-text" id="mode-text">題目說明載入中...</div>
    <div id="question-box"></div>

    <div id="step1" class="step-container" style="display: block;">
        <span class="step-title" id="step1-title">Q1. 第一步</span>
        <div id="q1-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options1"></div>
    </div>

    <div id="step2" class="step-container">
        <span class="step-title" id="step2-hint"></span>
        <div id="q2-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options2"></div>
    </div>

    <div id="step3" class="step-container">
        <span class="step-title" id="step3-hint"></span>
        <div id="q3-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options3"></div>
    </div>

    <div id="step4" class="step-container">
        <span class="step-title" id="step4-hint"></span>
        <div id="q4-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options4"></div>
    </div>

    <button id="next-btn" onclick="generateQuestion()">下一題</button>
</div>

<div class="container" id="result-screen">
    <h2>練習完成！</h2>
    <div class="score-display" id="final-score">0</div>
    <p>滿分 100 分，測驗結束。</p>
    <button class="btn" style="width: 100%; background: var(--primary-color); color: white;" onclick="resetQuiz()">回主選單</button>
</div>

<script>
    let quizMode = '';
    let questionCount = 0;
    let totalScore = 0;
    let isFirstTryQ1 = true; 
    let isFirstTryQ2 = true; 
    let isFirstTryQ3 = true;
    let isFirstTryQ4 = true;

    function formatNum(num, isLeading = false) {
        if (num < 0 && !isLeading) return `(${num})`;
        return num.toString();
    }

    // 跳轉至指定的 HTML 檔案
    function startQuiz(url) {
        window.location.href = url;
    }

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateQuestion() {
        if (questionCount >= 10) {
            showResult();
            return;
        }
        questionCount++;
        document.getElementById('question-number').innerText = `第 ${questionCount} 題 / 共 10 題`;
        resetStepUI();
    }

    function resetStepUI() {
        isFirstTryQ1 = isFirstTryQ2 = isFirstTryQ3 = isFirstTryQ4 = true;
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';
        document.getElementById('step4').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        ['1','2','3','4'].forEach(num => {
            document.getElementById(`options${num}`).innerHTML = '';
            document.getElementById(`q${num}-feedback`).innerText = '';
        });
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = totalScore + " 分";
    }

    function resetQuiz() {
        questionCount = 0;
        totalScore = 0;
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }

    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 128,
            height: 128
        });
    };
</script>

</body>
</html>
