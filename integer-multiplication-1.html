<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗栗大同國中資源中心</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f5f7fa;
            --selected-color: #ff9800;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%; max-width: 550px; text-align: center;
        }
        .question-text { font-size: 1.1rem; color: #555; margin-bottom: 0.5rem; text-align: left; }
        #question-box {
            font-size: 2.2rem; margin: 0.5rem 0 1.5rem 0; padding: 1.5rem;
            background: #f8f9fa; border-radius: 12px; border: 1px solid #eee;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 1rem; }
        .btn {
            padding: 1rem; font-size: 1.2rem; border: 2px solid var(--primary-color);
            background: white; border-radius: 10px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled { cursor: not-allowed; opacity: 0.8; }
        
        .selected { background: var(--selected-color) !important; color: white !important; border-color: var(--selected-color) !important; }
        .correct { background: var(--success-color) !important; color: white !important; border-color: var(--success-color); }
        .wrong { background: var(--error-color) !important; color: white !important; border-color: var(--error-color); }
        
        #confirm-btn, #next-btn {
            margin-top: 1.5rem; padding: 1rem; border: none; border-radius: 50px; 
            font-size: 1.1rem; display: none; width: 100%; cursor: pointer;
        }
        #confirm-btn { background: #333; color: white; }
        #next-btn { background: var(--primary-color); color: white; }
        
        .feedback-text { color: var(--error-color); font-weight: bold; margin-bottom: 10px; min-height: 1.5rem; font-size: 0.95rem; }
        #quiz-status { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #666; font-weight: bold; }
        
        #start-screen, #quiz-container, #result-screen { display: none; }
        #start-screen { display: block; } 
        
        .score-display { font-size: 3rem; color: var(--primary-color); margin: 1rem 0; }
        #qrcode-container {
            margin-top: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        #qrcode { padding: 10px; background: white; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <h2>苗栗大同國中資源中心</h2>
    <h3>練習一：簡單的乘法 $m \times n$</h3>
    <button class="btn" style="background: var(--primary-color); color: white; width: 100%;" onclick="startQuiz()">開始練習</button>
    <div id="qrcode-container">
        <div id="qrcode"></div>
        <span style="font-size: 0.8rem; color: #888;">掃描 QR Code 分享練習</span>
    </div>
</div>

<div class="container" id="quiz-container">
    <div id="quiz-status">
        <span id="question-number">第 1 題 / 共 10 題</span>
    </div>

    <div class="question-text">請計算下列算式之結果：</div>
    <div id="question-box"></div>

    <div id="answer-section">
        <div id="q-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options-container"></div>
    </div>

    <button id="confirm-btn" onclick="checkAnswer()">確認答案</button>
    <button id="next-btn" onclick="generateQuestion()">下一題</button>
</div>

<div class="container" id="result-screen">
    <h2>練習完成！</h2>
    <div class="score-display" id="final-score">0</div>
    <p>滿分 100 分，測驗結束。</p>
    <button class="btn" style="width: 100%; background: var(--primary-color); color: white;" onclick="resetQuiz()">回主選單</button>
</div>

<script>
    let currentA = 0;
    let currentB = 0;
    let questionCount = 0;
    let totalScore = 0;
    let isFirstTry = true;
    let selectedValue = null;
    let selectedBtn = null;

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        generateQuestion();
    }

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateQuestion() {
        if (questionCount >= 10) {
            showResult();
            return;
        }

        questionCount++;
        document.getElementById('question-number').innerText = `第 ${questionCount} 題 / 共 10 題`;
        isFirstTry = true;
        selectedValue = null;
        selectedBtn = null;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('confirm-btn').style.display = 'none';
        document.getElementById('q-feedback').innerText = '';
        document.getElementById('options-container').innerHTML = '';

        currentA = getRandomInt(-10, 10);
        currentB = getRandomInt(-10, 10);

        // 格式化 B，如果是負數則加括號
        let displayB = currentB < 0 ? `(${currentB})` : currentB;
        document.getElementById('question-box').innerHTML = `$$ ${currentA} \\times ${displayB} $$`;

        setupOptions();
        MathJax.typesetPromise();
    }

    function setupOptions() {
        const container = document.getElementById('options-container');
        let correctAnswer = currentA * currentB;

        let choiceSet = new Set();
        choiceSet.add(correctAnswer);
        
        // 增加干擾項：相反數、加法結果、漏掉負號的結果
        choiceSet.add(-(currentA * currentB));
        choiceSet.add(currentA + currentB); // 加法干擾
        choiceSet.add(currentA - currentB); // 減法干擾
        choiceSet.add(Math.abs(currentA * currentB));
        
        
        // 如果選項不足4個，隨機增補
        while(choiceSet.size < 4) {
            let offset = getRandomInt(-5, 5);
            if (offset !== 0) choiceSet.add(correctAnswer + offset);
        }

        // 隨機排序並選取前4個
        Array.from(choiceSet).sort(() => Math.random() - 0.5).slice(0, 4).forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = `$${val}$`;
            btn.onclick = () => {
                if (document.getElementById('next-btn').style.display === 'block') return;

                container.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedValue = parseInt(val);
                selectedBtn = btn;
                document.getElementById('confirm-btn').style.display = 'block';
            };
            container.appendChild(btn);
        });
    }

    function checkAnswer() {
        if (selectedValue === null) return;

        let correctAnswer = currentA * currentB;
        const container = document.getElementById('options-container');
        const feedbackEl = document.getElementById('q-feedback');

        if (selectedValue === correctAnswer) {
            // 答對時的邏輯
            selectedBtn.classList.remove('selected');
            selectedBtn.classList.add('correct');
            if (isFirstTry) totalScore += 10;
            container.querySelectorAll('.btn').forEach(b => b.disabled = true);
            document.getElementById('confirm-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
            feedbackEl.innerText = "太棒了！計算正確。";
            feedbackEl.style.color = "var(--success-color)";
        } else {
            // 答錯時的邏輯：根據錯誤類型給予不同回饋
            selectedBtn.classList.remove('selected');
            selectedBtn.classList.add('wrong');
            isFirstTry = false;
            feedbackEl.style.color = "var(--error-color)";

            // 1. 檢查是否為「運算錯誤」：誤把乘法當成加法/減法
            if (selectedValue === (currentA + currentB) || selectedValue === (currentA - currentB)) {
                feedbackEl.innerText = "提示：這是「乘法」，不是加減法！";
            }
            // 2. 檢查是否為「性質符號錯誤」：數值對但正負號錯
            else if (Math.abs(selectedValue) === Math.abs(correctAnswer)) {
                let rule = "";
                
                if (currentA > 0 && currentB > 0) {
                    rule = "「正正得正」";
                } else if (currentA > 0 && currentB < 0) {
                    rule = "「正負得負」";
                } else if (currentA < 0 && currentB > 0) {
                    rule = "「負正得負」";
                } else if (currentA < 0 && currentB < 0) {
                    rule = "「負負得正」";
                }

                feedbackEl.innerText = `提示：數字部分正確，但是 ${rule}。`;
            }
            // 3. 檢查是否為「0 的運算錯誤」
            else if ((currentA === 0 || currentB === 0) && selectedValue !== 0) {
                feedbackEl.innerText = "提示：任何數乘以 $0$，結果都會是 $0$ 喔！";
            }
            // 4. 其他隨機生成的干擾項
            else {
                feedbackEl.innerText = "提示：計算錯誤，再回想一下乘法表吧！";
            }

            document.getElementById('confirm-btn').style.display = 'none';
            MathJax.typesetPromise();
        }
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = totalScore + " 分";
    }

    function resetQuiz() {
        questionCount = 0; totalScore = 0;
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }

    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href, width: 128, height: 128
        });
    };
</script>

</body>
</html>
